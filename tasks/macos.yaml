---
# TODO: Use sudo once .macos can be run via root with no user interaction.
- name: Set macOS hostname
  become: true
  ansible.builtin.command: "{{ item }}"
  loop:
    - "scutil --set HostName {{ macos.hostname }}"
    - "scutil --set LocalHostName {{ macos.hostname }}"
    - "scutil --set ComputerName {{ macos.hostname }}"
    - "defaults write /Library/Preferences/SystemConfiguration/com.apple.smb.server NetBIOSName -string {{ macos.hostname }}"
  changed_when: true

- name: Configure Finder preferences
  community.general.osx_defaults:
    domain: com.apple.finder
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  loop:
    - key: AppleShowAllFiles
      type: bool
      value: "{{ macos.Finder.AppleShowAllFiles }}"
    - key: ShowPathbar
      type: bool
      value: "{{ macos.Finder.ShowPathbar }}"
    - key: ShowStatusBar
      type: bool
      value: "{{ macos.Finder.ShowStatusBar }}"
    - key: _FXShowPosixPathInTitle
      type: bool
      value: "{{ macos.Finder._FXShowPosixPathInTitle }}"

- name: Configure Dock preferences
  community.general.osx_defaults:
    domain: com.apple.dock
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  loop:
    - key: autohide
      type: bool
      value: "{{ macos.Dock.autohide }}"
    - key: minimize-to-application
      type: bool
      value: "{{ macos.Dock.minimizeToApplication }}"
    - key: tilesize
      type: int
      value: "{{ macos.Dock.tilesize }}"
  notify: Restart dock

- name: Disable auto-correct
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: "{{ macos.AutomaticSpellingCorrectionEnabled }}"

- name: Disable volume change feedback
  community.general.osx_defaults:
    key: com.apple.sound.beep.feedback
    type: bool
    value: "{{ macos.volumeChangeFeedback }}"

- name: Expand save panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  loop:
    - key: NSNavPanelExpandedStateForSaveMode
      type: bool
      value: "{{ macos.navPanelExpandedStateForSaveMode }}"
    - key: NSNavPanelExpandedStateForSaveMode2
      type: bool
      value: "{{ macos.navPanelExpandedStateForSaveMode2 }}"

- name: Expand print panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  loop:
    - key: PMPrintingExpandedStateForPrint
      type: bool
      value: "{{ macos.printPanelExpandedStateForPrint }}"
    - key: PMPrintingExpandedStateForPrint2
      type: bool
      value: "{{ macos.printPanelExpandedStateForPrint2 }}"

- name: Screenshot settings
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  loop:
    - key: location
      type: string
      value: "{{ macos.Screenshots.Folder }}"
    - key: type
      type: string
      value: "{{ macos.Screenshots.Format }}"

- name: Enable Apple Font Smoothing on Non-Retina Displays
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleFontSmoothing
    type: int
    value: 2
  when: macos.enableAppleFontSmoothingOnNonRetinaDisplays

- name: Disable the "Are you sure you want to open this application?" dialog
  community.general.osx_defaults:
    domain: com.apple.LaunchServices
    key: LSQuarantine
    type: bool
    value: "{{ macos.disableLaunchServicesQuarantine }}"

- name: Enable firewall
  become: true
  ansible.builtin.command: /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate on
  when: macos.enableFirewall
  changed_when: false

- name: Enable stealth mode
  become: true
  ansible.builtin.command: /usr/libexec/ApplicationFirewall/socketfilterfw --setstealthmode on
  when: macos.enableStealthMode
  changed_when: false

- name: Enable SSH (Remote Login)
  become: true
  ansible.builtin.command: systemsetup -setremotelogin on
  when: macos.enableSsh
  changed_when: false

- name: Harden SSH
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
  notify: Restart sshd

- name: Create common directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ lookup('env', 'HOME') }}/Projects"
    - "{{ lookup('env', 'HOME') }}/Developer"
    - "{{ lookup('env', 'HOME') }}/.ssh"
    - "{{ lookup('env', 'HOME') }}/temp"

- name: Create src symlink pointing to Developer
  ansible.builtin.file:
    src: "{{ lookup('env', 'HOME') }}/Developer"
    dest: "{{ lookup('env', 'HOME') }}/src"
    state: link

- name: Install Rosetta
  block:
    - name: Install Rosetta
      ansible.builtin.command: /usr/sbin/softwareupdate --install-rosetta --agree-to-license
      changed_when: false

- name: Run .macos dotfiles.
  ansible.builtin.command: "{{ macos_script }}"
  changed_when: false
