---
- name: Trust added taps
  ansible.builtin.command:
    cmd: "brew trust dracula/install"

- name: Install Homebrew CLI apps
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  with_items: "{{ homebrew_installed_packages }}"
  environment:
    # 1. Provide the path to your executable helper program
    SUDO_ASKPASS: "{{ askpass_program_path }}"
    # 2. Force child tasks to look for the askpass binary
    SUDO_FLAGS: "-A"

- name: Initialize tealdeer
  ansible.builtin.command:
    cmd: "tldr --update"

- name: Install Homebrew Casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  with_items: "{{ homebrew_cask_apps }}"
  environment:
    # 1. Provide the path to your executable helper program
    SUDO_ASKPASS: "{{ askpass_program_path }}"
    # 2. Force child tasks to look for the askpass binary
    SUDO_FLAGS: "-A"
