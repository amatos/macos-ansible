---
- name: Trust added taps
  ansible.builtin.command:
    cmd: "brew trust dracula/install buo/cask-upgrade domt4/autoupdate"

- name: Install Homebrew CLI apps
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  with_items: "{{ homebrew_installed_packages }}"
  environment:
    # 1. Provide the path to your executable helper program
    SUDO_ASKPASS: "{{ askpass_program_path }}"
    # 2. Force child tasks to look for the askpass binary
    SUDO_FLAGS: "-A"

- name: Initialize tealdeer
  ansible.builtin.command:
    cmd: "tldr --update"

- name: Symlink claude
  ansible.builtin.file:
    src: "/opt/homebrew/bin/claude"
    dest: "/usr/local/bin/claude"
    state: link

- name: Install Homebrew Casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  with_items: "{{ homebrew_cask_apps }}"
  environment:
    # 1. Provide the path to your executable helper program
    SUDO_ASKPASS: "{{ askpass_program_path }}"
    # 2. Force child tasks to look for the askpass binary
    SUDO_FLAGS: "-A"
