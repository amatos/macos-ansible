---
- name: Configure host.
  hosts: all

  vars_files:
    - default.config.yaml
    - homebrew.config.yaml
    - mas.config.yaml
    - dock.config.yaml

  pre_tasks:
    - name: Include playbook configuration.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yaml"
      tags: ["always"]

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: wayofdev.homebrew
      when: configure_homebrew
      tags: ["homebrew"]

  tasks:
    - import_tasks: tasks/pam-touchid.yaml
      when: configure_pam_touchid
      tags: ["pam-touchid"]

    - import_tasks: tasks/homebrew.yaml
      when: configure_homebrew
      tags: ["homebrew"]

    - import_tasks: tasks/sudoers.yaml
      when: configure_sudoers
      tags: ["sudoers"]

    - import_tasks: tasks/terminal.yaml
      when: configure_terminal
      tags: ["terminal"]

    - import_tasks: tasks/gpg.yaml
      when: configure_gpg
      tags: ["gpg"]

    - import_tasks: tasks/macos.yaml
      when: configure_macos
      tags: ["osx"]

    - import_tasks: tasks/mas.yaml
      when: install_mas_apps | bool
      tags: ["mas"]

    - import_tasks: tasks/extra-packages.yaml
      tags: ["extra-packages"]

    - import_tasks: tasks/dotfiles.yaml
      tags: ["dotfiles"]
      when: configure_homebrew and configure_gpg and configure_dotfiles | bool

    - name: Run post-provision task files in a block.
      tags: ["post"]
      block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"

  handlers:
    - name: restart dock
      ansible.builtin.command: killall Dock

    - name: restart sshd
      become: true
      community.general.launchd:
        name: com.openssh.sshd
        plist: ssh.plist
        state: restarted
