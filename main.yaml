---
- name: Configure host.
  hosts: all

  vars_files:
    - default.config.yaml
    - homebrew.config.yaml
    - mas.config.yaml
    - dock.config.yaml

  pre_tasks:
    - name: Include playbook configuration.
      ansible.builtin.include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yaml"
      tags: ["always"]

    - name: Merge user_overrides into user defaults.
      ansible.builtin.set_fact:
        user: "{{ user | combine(user_overrides, recursive=True) }}"
      tags: ["always"]

    - name: Merge macos_overrides into macos defaults.
      ansible.builtin.set_fact:
        macos: "{{ macos | combine(macos_overrides, recursive=True) }}"
      tags: ["always"]

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: wayofdev.homebrew
      when: configure_homebrew
      tags: ["homebrew"]
    - role: wayofdev.dock
      when: configure_dock
      tags: ["dock"]

  tasks:
    - name: Configure PAM TouchID
      ansible.builtin.import_tasks: tasks/pam-touchid.yaml
      when: configure_pam_touchid
      tags: ["pam-touchid"]

    - name: Configure Homebrew
      ansible.builtin.import_tasks: tasks/homebrew.yaml
      when: configure_homebrew
      tags: ["homebrew"]

    - name: Configure sudoers
      ansible.builtin.import_tasks: tasks/sudoers.yaml
      when: configure_sudoers
      tags: ["sudoers"]

    - name: Configure Terminal
      ansible.builtin.import_tasks: tasks/terminal.yaml
      when: configure_terminal
      tags: ["terminal"]

    - name: Configure GPG
      ansible.builtin.import_tasks: tasks/gpg.yaml
      when: configure_gpg
      tags: ["gpg"]

    - name: Configure macOS settings
      ansible.builtin.import_tasks: tasks/macos.yaml
      when: configure_macos
      tags: ["macos"]

    - name: Install MAS apps
      ansible.builtin.import_tasks: tasks/mas.yaml
      when: install_mas_apps | bool
      tags: ["mas"]

    - name: Install extra packages
      ansible.builtin.import_tasks: tasks/extra-packages.yaml
      tags: ["extra-packages"]

    - name: Configure dotfiles
      ansible.builtin.import_tasks: tasks/dotfiles.yaml
      tags: ["dotfiles"]
      when: configure_homebrew and configure_gpg and configure_dotfiles | bool

    - name: Run post-provision task files in a block.
      tags: ["post"]
      block:
        - name: Run configured post-provision ansible task files.
          ansible.builtin.include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"

  handlers:
    - name: Restart dock
      ansible.builtin.command: killall Dock
      changed_when: false

    - name: Restart sshd
      become: true
      community.general.launchd:
        name: com.openssh.sshd
        plist: ssh.plist
        state: restarted
